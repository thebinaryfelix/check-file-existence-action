name: 'Check File Existence'
description: 'GitHub Action to check if file(s) exists'
author: 'Mateus Félix'
branding:
  icon: 'file-text'
  color: 'green'
inputs:
  files:
    description: 'File name with (optional) directory path, separated by comma.'
    required: true
  follow_symlinks:
    description: 'Whether to follow symbolic links.'
    required: false
    default: 'true'
  ignore_case:
    description: 'Perform a case-insensitive match.'
    required: false
    default: 'true'
outputs:
  exists:
    description: 'Whether the informed file(s) exists or not.'
runs:
  using: 'node24'
  main: 'dist/index.js'
